<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TfL Dashboard</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
}

body {
  background:#0f1115;
  color:#e6e6e6;
  font-family:monospace;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

h1 {
  text-align:center;
  margin:10px 0;
}

.controls {
  text-align:center;
  margin-bottom:10px;
}

select {
  padding:6px;
  font-size:16px;
  margin:0 5px;
}

.container {
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
  height:calc(var(--vh, 1vh) * 100);
}

.section {
  display:flex;
  flex-direction:column;
  background:#1a1d24;
  border-radius:10px;
  padding:10px;
}

.flip-row, .line-status {
  display:flex;
  justify-content:space-between;
  font-size:clamp(14px, 2.2vh, 28px);
}

.left, .right { display:flex; }

.updated {
  text-align:center;
  color:#888;
  font-size:12px;
}
</style>
</head>

<body>

<h1>TfL Dashboard</h1>

<div class="controls">
  <select id="stationSelect"></select>
  <select id="directionSelect">
    <option value="eastbound">Eastbound</option>
    <option value="westbound">Westbound</option>
  </select>
</div>

<div class="container">
  <div class="section">
    <h2>Line Status</h2>
    <div id="status"></div>
  </div>

  <div class="section">
    <h2>Departures</h2>
    <div id="flipboard"></div>
  </div>
</div>

<div class="updated" id="updated"></div>

<script>

/* STATIONS */
const stations = [
 "Abbey Wood","Acton Main Line","Bond Street","Brentwood","Canary Wharf",
 "Chadwell Heath","Custom House","Ealing Broadway","Farringdon","Forest Gate",
 "Gidea Park","Goodmayes","Hanwell","Harold Wood","Hayes & Harlington",
 "Heathrow Terminal 2 & 3","Heathrow Terminal 4","Heathrow Terminal 5",
 "Ilford","Iver","Langley","Liverpool Street","Maidenhead","Manor Park",
 "Maryland","Paddington","Reading","Romford","Seven Kings","Shenfield",
 "Slough","Southall","Stratford","Taplow","Tottenham Court Road",
 "West Drayton","Whitechapel","Woolwich"
];

let selectedStation = "Ealing Broadway";
let selectedDirection = "eastbound";

/* DROPDOWNS */
function setupControls(){
  const stationSelect = document.getElementById("stationSelect");
  const directionSelect = document.getElementById("directionSelect");

  stations.forEach(s => {
    const o = document.createElement("option");
    o.value = s;
    o.textContent = s;
    if(s === selectedStation) o.selected = true;
    stationSelect.appendChild(o);
  });

  stationSelect.addEventListener("change", e => {
    selectedStation = e.target.value;
    updateFlipboard();
  });

  directionSelect.addEventListener("change", e => {
    selectedDirection = e.target.value;
    updateFlipboard();
  });
}

setupControls();

/* HELPERS */
function mins(t){
  return Math.max(0, Math.round((new Date(t)-new Date())/60000));
}

/* 🚆 FILTER LOGIC */
function isEastbound(destination){
  const eastStops = ["Abbey Wood","Shenfield"];
  return eastStops.some(stop => destination.includes(stop));
}

function isWestbound(destination){
  const westStops = ["Reading","Heathrow","Maidenhead"];
  return westStops.some(stop => destination.includes(stop));
}

/* FETCH TRAINS */
async function fetchTrains(){
  const res = await fetch("https://api.tfl.gov.uk/Line/elizabeth/Arrivals");
  const data = await res.json();

  const trains = data
    .filter(t =>
      t.stationName &&
      t.stationName.toLowerCase().includes(selectedStation.toLowerCase())
    )
    .filter(t => {
      if(selectedDirection === "eastbound"){
        return isEastbound(t.destinationName);
      } else {
        return isWestbound(t.destinationName);
      }
    })
    .sort((a,b)=>new Date(a.expectedArrival)-new Date(b.expectedArrival))
    .slice(0,6);

  return trains.map(t => ({
    text: t.destinationName,
    minsAway: mins(t.expectedArrival)
  }));
}

/* RENDER */
async function updateFlipboard(){
  const trains = await fetchTrains();
  const container = document.getElementById("flipboard");

  container.innerHTML = "";

  trains.forEach(t => {
    const row = document.createElement("div");
    row.className = "flip-row";

    const left = document.createElement("div");
    left.textContent = t.text;

    const right = document.createElement("div");
    right.textContent = t.minsAway === 0 ? "Due" : t.minsAway + " min";

    row.appendChild(left);
    row.appendChild(right);
    container.appendChild(row);
  });
}

/* STATUS */
async function fetchStatus(){
  const res = await fetch("https://api.tfl.gov.uk/Line/Mode/tube,elizabeth-line/Status");
  const data = await res.json();
  const container = document.getElementById("status");

  container.innerHTML = "";

  data.forEach(line => {
    const row = document.createElement("div");
    row.className = "line-status";

    row.innerHTML = `<div>${line.name}</div><div>${line.lineStatuses[0].statusSeverityDescription}</div>`;
    container.appendChild(row);
  });
}

/* REFRESH */
async function refresh(){
  await fetchStatus();
  await updateFlipboard();
  document.getElementById("updated").innerText =
    "Updated: " + new Date().toLocaleTimeString();
}

refresh();
setInterval(refresh, 60000);

</script>

</body>
</html>
